<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>설비동 내부 상세 — 국수 AX</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  /* 단독창: 패널이 창 전체를 채움 */
  body { margin: 0; }
  #bd-modal { position: fixed; inset: 0; background: #eceff1; pointer-events: auto; }
  #bd-panel { position: absolute; inset: 0; width: auto; height: auto;
    left: 0 !important; top: 0 !important; border-radius: 0; resize: none;
    min-width: 0; min-height: 0; border: none; }
</style>
<script>window.BD_STANDALONE = true;</script>
<script src="https://unpkg.com/cytoscape@3/dist/cytoscape.min.js"></script>
</head>
<body>
<div id="bd-modal">
  <div id="bd-panel">
    <header id="bd-head">
      <h2>설비동 내부 상세</h2>
      <div id="bd-viewtabs">
        <button data-tab="plan" class="on">배치도</button>
        <button data-tab="flow">계통도</button>
      </div>
      <button id="bd-close" title="닫기">✕</button>
    </header>
    <div id="bd-body">
      <aside id="bd-left">
        <div id="bd-floors"></div>
        <input id="bd-search" type="text" placeholder="장비명·태그 검색">
        <div id="bd-count"></div>
        <div id="bd-list"></div>
      </aside>
      <main id="bd-center">
        <div id="bd-view"></div>
      </main>
      <aside id="bd-right">
        <div class="bd-side-title">연결 관계</div>
        <div id="bd-cy"></div>
        <div class="bd-side-title">장비 내역</div>
        <div id="bd-card"></div>
      </aside>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
